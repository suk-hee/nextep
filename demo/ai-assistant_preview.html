<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant Component Preview - KLDS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../styles/reset.css">
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../components/prompt/prompt.css">
  <link rel="stylesheet" href="../components/ai-assistant/ai-assistant.css">
  <style>
    body {
      font-family: var(--klds-typography-fontfamily-text), -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 0;
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .preview-container {
      display: flex;
      gap: 40px;
      align-items: stretch;
      height: 100vh;
      padding: 40px;
      box-sizing: border-box;
    }

    .log-section {
      width: 400px;
      height: calc(100vh - 80px);
      background: #1e1e1e;
      border-radius: 12px;
      padding: 20px;
      color: #d4d4d4;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.8;
      overflow-y: auto;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }

    .log-title {
      color: #4EC9B0;
      font-weight: 700;
      margin-bottom: 16px;
      font-size: 16px;
    }

    .log-item {
      padding: 4px 0;
      border-bottom: 1px solid #333;
    }

    .log-item:last-child {
      border-bottom: none;
    }

    .log-time {
      color: #858585;
      margin-right: 8px;
    }

    .log-type {
      color: #4FC3F7;
      margin-right: 8px;
      font-weight: 600;
    }

    .log-message {
      color: #CE9178;
    }

    .log-action {
      color: #C586C0;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="preview-container">

    <!-- AI Assistant Component -->
    <div class="ai-assistant">
      <div class="ai-assistant__default">
        <div class="ai-assistant__wrap">

          <!-- Header -->
          <header class="ai-assistant__header">
            <button class="ai-assistant__btn-maximize" aria-label="사이드바 확장">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M20 6C20 5.73478 19.8946 5.48051 19.707 5.29297C19.5429 5.12883 19.3276 5.02757 19.0986 5.00488L19 5H16V19H19C19.2652 19 19.5195 18.8946 19.707 18.707C19.8946 18.5195 20 18.2652 20 18V6ZM4 18L4.00488 18.0986C4.02757 18.3276 4.12883 18.5429 4.29297 18.707C4.48051 18.8946 4.73478 19 5 19H14V5H5C4.73478 5 4.4805 5.10543 4.29297 5.29297C4.10543 5.4805 4 5.73478 4 6V18ZM22 18C22 18.7957 21.6837 19.5585 21.1211 20.1211C20.5585 20.6837 19.7957 21 19 21H5C4.20435 21 3.44151 20.6837 2.87891 20.1211C2.3163 19.5585 2 18.7956 2 18V6C2 5.20435 2.3163 4.44152 2.87891 3.87891C3.44152 3.3163 4.20435 3 5 3H19C19.7957 3 20.5585 3.3163 21.1211 3.87891C21.6837 4.44151 22 5.20435 22 6V18Z"
                  fill="#121212" />
              </svg>
              <h1 class="ai-assistant__title">AI Assistant</h1>
            </button>

            <button class="ai-assistant__btn-close" aria-label="닫기">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd" clip-rule="evenodd"
                  d="M4.79289 5.29289C5.18342 4.90237 5.81658 4.90237 6.20711 5.29289L11.5 10.5858L16.7929 5.29289C17.1835 4.90237 17.8166 4.90237 18.2071 5.29289C18.5977 5.68342 18.5977 6.31658 18.2071 6.70711L12.9142 12L18.2071 17.2929C18.5976 17.6834 18.5976 18.3165 18.2071 18.7071C17.8165 19.0976 17.1834 19.0976 16.7929 18.7071L11.5 13.4142L6.20711 18.7071C5.81658 19.0977 5.18342 19.0977 4.79289 18.7071C4.40237 18.3166 4.40237 17.6835 4.79289 17.2929L10.0858 12L4.79289 6.70711C4.40237 6.31658 4.40237 5.68342 4.79289 5.29289Z"
                  fill="#121212" />
              </svg>
            </button>
          </header>

          <!-- Contents -->
          <div class="ai-assistant__contents">
            <h2 class="ai-assistant__greeting">박소정님의 업무를
              스마트하게 도와드립니다.</h2>

            <div class="ai-assistant__btn-list">
              <button class="ai-assistant__btn" data-action="rocket">
                <div class="ai-assistant__btn-icon">
                  <img src="../assets/ai-assistant/icon-rocket.svg" alt="">
                </div>
                <p class="ai-assistant__btn-label">브리핑 보기</p>
              </button>

              <button class="ai-assistant__btn" data-action="mail">
                <div class="ai-assistant__btn-icon">
                  <img src="../assets/ai-assistant/icon-mail.svg" alt="">
                </div>
                <p class="ai-assistant__btn-label">안읽은 메일 요약</p>
              </button>

              <button class="ai-assistant__btn" data-action="calendar">
                <div class="ai-assistant__btn-icon">
                  <img src="../assets/ai-assistant/icon-calendar.svg" alt="">
                </div>
                <p class="ai-assistant__btn-label">이번주 일정 확인</p>
              </button>

              <button class="ai-assistant__btn" data-action="beach-ball">
                <div class="ai-assistant__btn-icon">
                  <img src="../assets/ai-assistant/icon-beach-ball.svg" alt="">
                </div>
                <p class="ai-assistant__btn-label">연차 휴가 등록</p>
              </button>

              <button class="ai-assistant__btn" data-action="reserve">
                <div class="ai-assistant__btn-icon">
                  <img src="../assets/ai-assistant/icon-reserve.svg" alt="">
                </div>
                <p class="ai-assistant__btn-label">회의실 예약</p>
              </button>

              <button class="ai-assistant__btn" data-action="meeting-minutes">
                <div class="ai-assistant__btn-icon">
                  <img src="../assets/ai-assistant/icon-meeting-minutes.svg" alt="">
                </div>
                <p class="ai-assistant__btn-label">회의록 작성</p>
              </button>
            </div>
          </div>

          <!-- Prompt -->
          <div class="ai-assistant__prompt">
            <div class="prompt" data-base-path="../assets/icons/">
              <div class="prompt__wrap">
                <button class="prompt__btn-global" aria-label="글로벌 옵션">
                  <img src="../assets/icons/ic-global.svg" alt="" width="24" height="24">
                </button>

                <textarea class="prompt__input" placeholder="원하는 업무를 입력하세요." rows="1" aria-label="프롬프트 입력"></textarea>

                <div class="prompt__right-btns">
                  <button class="prompt__btn prompt__btn--mic" aria-label="음성 입력">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <path
                        d="M4 10C4 9.44772 4.44772 9 5 9C5.55228 9 6 9.44772 6 10C6 11.5913 6.63259 13.117 7.75781 14.2422C8.88303 15.3674 10.4087 16 12 16L12.2979 15.9922C13.7807 15.9185 15.1874 15.297 16.2422 14.2422C17.3674 13.117 18 11.5913 18 10C18 9.44772 18.4477 9 19 9C19.5523 9 20 9.44772 20 10C20 12.1217 19.1575 14.1569 17.6572 15.6572C16.3947 16.9198 14.7529 17.7137 13 17.9346V20H16C16.5523 20 17 20.4477 17 21C17 21.5523 16.5523 22 16 22H8C7.44772 22 7 21.5523 7 21C7 20.4477 7.44772 20 8 20H11V17.9346C9.24713 17.7137 7.60532 16.9198 6.34277 15.6572C4.84248 14.1569 4 12.1217 4 10ZM14 5C14 4.46957 13.7891 3.96101 13.4141 3.58594C13.0858 3.25765 12.6553 3.05515 12.1973 3.00977L12 3C11.4696 3 10.961 3.21087 10.5859 3.58594C10.2109 3.96101 10 4.46957 10 5V10C10 10.5304 10.2109 11.039 10.5859 11.4141C10.961 11.7891 11.4696 12 12 12C12.5304 12 13.039 11.7891 13.4141 11.4141C13.7891 11.039 14 10.5304 14 10V5ZM16 10C16 11.0609 15.5783 12.078 14.8281 12.8281C14.078 13.5783 13.0609 14 12 14C10.9391 14 9.92202 13.5783 9.17188 12.8281C8.42173 12.078 8 11.0609 8 10V5C8 3.93913 8.42173 2.92202 9.17188 2.17188C9.92202 1.42173 10.9391 1 12 1L12.1982 1.00488C13.1869 1.0539 14.1248 1.46859 14.8281 2.17188C15.5783 2.92202 16 3.93913 16 5V10Z"
                        fill="#374151" />
                    </svg>
                  </button>
                  <button class="prompt__btn prompt__btn--send" aria-label="전송" disabled>
                    <span class="prompt__btn-icon"
                      style="-webkit-mask-image:url(../assets/icons/ic-arrow-circle-up02.svg);mask-image:url(../assets/icons/ic-arrow-circle-up02.svg)"></span>
                  </button>
                </div>

                <div class="prompt__btns"></div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- Event Log -->
    <div class="log-section">
      <div class="log-title">🤖 AI Assistant Event Log</div>
      <div id="eventLog">
        <div class="log-item">
          <span class="log-time">[Ready]</span>
          <span class="log-type">INFO</span>
          <span class="log-message">AI Assistant 초기화 완료</span>
        </div>
      </div>
    </div>

  </div>

  <script src="../components/components.js"></script>
  <script type="module" src="../components/prompt/prompt.js"></script>
  <script type="module" src="../components/ai-assistant/ai-assistant.js"></script>

  <!-- Preview 이벤트 로깅 -->
  <script>
    const logEl = document.getElementById('eventLog');

    function addLog(type, msg, action = '') {
      const time = new Date().toTimeString().split(' ')[0];
      const item = document.createElement('div');
      item.className = 'log-item';
      item.innerHTML =
        '<span class="log-time">[' + time + ']</span>' +
        '<span class="log-type">' + type + '</span>' +
        (action ? '<span class="log-action">[' + action + ']</span> ' : '') +
        '<span class="log-message">' + msg + '</span>';
      logEl.appendChild(item);
      logEl.scrollTop = logEl.scrollHeight;
      if (logEl.children.length > 50) logEl.removeChild(logEl.firstChild);
    }

    // AI Assistant 이벤트
    document.addEventListener('ai-assistant:maximize', function () {
      addLog('HEADER', '사이드바 확장 클릭', 'MAXIMIZE');
    });

    document.addEventListener('ai-assistant:close', function () {
      addLog('HEADER', '닫기 버튼 클릭', 'CLOSE');
    });

    document.addEventListener('ai-assistant:action', function (e) {
      const actionMap = {
        'rocket': '브리핑 보기',
        'mail': '안읽은 메일 요약',
        'calendar': '이번주 일정 확인',
        'beach-ball': '연차 휴가 등록',
        'reserve': '회의실 예약',
        'meeting-minutes': '회의록 작성'
      };
      addLog('ACTION', actionMap[e.detail.action] + ' 버튼 클릭', e.detail.action.toUpperCase());
    });

    document.addEventListener('ai-assistant:prompt', function (e) {
      const text = e.detail.text;
      addLog('PROMPT', '메시지 전송: "' + text.substring(0, 30) + '"', 'SEND');

      const contentsContainer = document.querySelector('.ai-assistant__contents');

      // 처음 입력 시 기본 홈을 지우고 채팅 모드로 전환
      if (!contentsContainer.classList.contains('ai-assistant__contents--chat')) {
        contentsContainer.innerHTML = '';
        contentsContainer.classList.add('ai-assistant__contents--chat');
      }

      // 사용자 메시지
      const userBubble = document.createElement('div');
      userBubble.className = 'ai-assistant__chat-bubble ai-assistant__chat-bubble--user';
      userBubble.innerHTML = `
        <div class="ai-assistant__chat-bubble-content">
          <p class="ai-assistant__chat-bubble-text">${text}</p>
        </div>
      `;
      contentsContainer.appendChild(userBubble);

      // (데모용) 응답 대기 후 AI 메시지
      // (데모용) 응답 대기 후 AI 메시지
      setTimeout(() => {
        addLog('AI', '응답 생성 표시', 'REPLY');
        const aiMessage = document.createElement('div');

        // 키워드에 따른 모의 응답 생성
        let responseContent = AI_CHAT_TEXT_HTML; // 기본 응답 (PPT 변환)
        if (text.includes('경비') || text.includes('영어')) {
          responseContent = `
            <p class="ai-assistant__chat-text">
              경비 처리는 비즈니스 영어로 일반적으로 <strong>'Expense claim'</strong> 또는 <strong>'Expense report'</strong>라고 표현합니다. 관련하여 내부 비용 청구 시스템(Concur 등)을 통해 청구서를 작성하실 수 있습니다.
            </p>
          `;
        } else if (text.includes('일정') || text.includes('회의')) {
          responseContent = `
            <p class="ai-assistant__chat-text">
              요청하신 일정/회의 관련 정보를 확인했습니다. 사내 캘린더 시스템을 통해 빈 회의실을 찾고 관련자들에게 초대 메일을 발송하도록 도와드릴까요?
            </p>
          `;
        } else if (!text.includes('ppt') && !text.includes('인포그래픽')) {
          responseContent = `
            <p class="ai-assistant__chat-text">
              말씀하신 "${text}"에 대해 분석 중입니다. 더 구체적인 정보나 처리가 필요하다면 알려주세요.
            </p>
          `;
        }

        aiMessage.innerHTML = responseContent;
        contentsContainer.appendChild(aiMessage.firstElementChild);

        contentsContainer.scrollTop = contentsContainer.scrollHeight;
      }, 500);

      contentsContainer.scrollTop = contentsContainer.scrollHeight;
    });
  </script>
</body>

</html>
