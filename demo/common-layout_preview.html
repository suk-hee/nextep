<body>
  <!--

  <!-- JS: AI Assistant 닫기/열기 인라인 -->
  <script>
    (function () {
      'use strict';

      var aiPanel = document.querySelector('.ai-assistant');
      var btnClose = document.querySelector('.ai-assistant__btn-close');
      var btnMaximize = document.querySelector('.ai-assistant__btn-maximize');
      var workArea = document.querySelector('.layout-content__work-area');

      if (!aiPanel || !btnClose) return;

      /* 닫기 */
      btnClose.addEventListener('click', function () {
        aiPanel.classList.remove('is-maximized');
        if (workArea) workArea.classList.remove('is-hidden');
        aiPanel.classList.add('is-hidden');
      });

      /* 최대화 토글: work-area 숨기고 ai-assistant 전체 너비 */
      if (btnMaximize && workArea) {
        btnMaximize.addEventListener('click', function () {
          var isMaximized = aiPanel.classList.toggle('is-maximized');
          if (isMaximized) {
            workArea.classList.add('is-hidden');
          } else {
            workArea.classList.remove('is-hidden');
          }
        });
      }

      /* 열기/닫기: 외부에서 스크립트로 호출 가능하도록 전역 노출 */
      window.toggleAiAssistant = function (show) {
        if (typeof show === 'undefined') {
          aiPanel.classList.toggle('is-hidden');
        } else if (show) {
          aiPanel.classList.remove('is-hidden');
        } else {
          aiPanel.classList.add('is-hidden');
        }
      };
    })();
  </script>

  <!-- JS: prompt -->
  <script src="../components/prompt/prompt.js"></script>
