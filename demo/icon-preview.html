<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icon Component Preview — KLDS Design System</title>
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <style>
        :root {
            --color-primary: #005386;
            --color-gray-900: #111827;
            --color-gray-700: #374151;
            --color-gray-500: #6B7280;
            --color-gray-400: #9CA3AF;
            --color-gray-300: #D1D5DB;
            --color-gray-200: #E5E7EB;
            --color-gray-100: #F3F4F6;
            --color-gray-50: #F9FAFB;
            --color-white: #FFFFFF;
            --color-danger: #EF4444;
            --color-success: #10B981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--color-gray-100);
            color: var(--color-gray-900);
            min-height: 100vh;
        }

        /* ===== Header ===== */
        .header {
            background: var(--color-white);
            border-bottom: 1px solid var(--color-gray-200);
            padding: 24px 32px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--color-gray-900);
        }

        .header h1 span {
            color: var(--color-primary);
        }

        .header-meta {
            font-size: 13px;
            color: var(--color-gray-500);
        }

        .header-meta strong {
            color: var(--color-primary);
            font-weight: 600;
        }

        /* ===== Controls Bar ===== */
        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-box {
            position: relative;
            flex: 1;
            min-width: 240px;
            max-width: 400px;
        }

        .search-box input {
            width: 100%;
            height: 40px;
            padding: 0 12px 0 40px;
            border: 1px solid var(--color-gray-300);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            background: var(--color-white);
            transition: border-color 0.15s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(0, 83, 134, 0.1);
        }

        .search-box .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            opacity: 0.4;
        }

        /* Size Toggle */
        .size-toggle {
            display: flex;
            border: 1px solid var(--color-gray-300);
            border-radius: 8px;
            overflow: hidden;
            background: var(--color-white);
        }

        .size-toggle button {
            padding: 8px 14px;
            font-size: 13px;
            font-family: inherit;
            font-weight: 500;
            border: none;
            background: transparent;
            color: var(--color-gray-500);
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .size-toggle button.active {
            background: var(--color-primary);
            color: var(--color-white);
        }

        .size-toggle button:not(:last-child) {
            border-right: 1px solid var(--color-gray-300);
        }

        /* Color Toggle */
        .color-toggle {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .color-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--color-gray-300);
            cursor: pointer;
            transition: border-color 0.15s, transform 0.15s;
        }

        .color-btn:hover {
            transform: scale(1.1);
        }

        .color-btn.active {
            border-color: var(--color-primary);
            border-width: 3px;
        }

        /* Category Filter */
        .category-filter {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .category-chip {
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 500;
            font-family: inherit;
            border: 1px solid var(--color-gray-300);
            border-radius: 20px;
            background: var(--color-white);
            color: var(--color-gray-500);
            cursor: pointer;
            transition: all 0.15s;
        }

        .category-chip:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .category-chip.active {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: var(--color-white);
        }

        .category-chip .count {
            margin-left: 4px;
            opacity: 0.7;
        }

        /* ===== Main Content ===== */
        .main {
            padding: 24px 32px 48px;
        }

        .result-info {
            font-size: 13px;
            color: var(--color-gray-500);
            margin-bottom: 16px;
        }

        .result-info strong {
            color: var(--color-gray-900);
        }

        /* ===== Icon Grid ===== */
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 8px;
        }

        .icon-grid.size-lg {
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        }

        .icon-grid.size-sm {
            grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
        }

        /* ===== Icon Card ===== */
        .icon-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px 8px 12px;
            background: var(--color-white);
            border: 1px solid var(--color-gray-200);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
        }

        .icon-card:hover {
            border-color: var(--color-primary);
            box-shadow: 0 2px 8px rgba(0, 83, 134, 0.12);
            transform: translateY(-2px);
        }

        .icon-card.copied {
            border-color: var(--color-success);
            background: #ECFDF5;
        }

        .icon-card .icon-preview {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 8px;
            transition: background 0.15s;
        }

        .icon-card .icon-preview img {
            display: block;
            transition: filter 0.15s;
        }

        .icon-card .icon-name {
            font-size: 11px;
            color: var(--color-gray-500);
            text-align: center;
            line-height: 1.3;
            word-break: break-all;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .icon-grid.size-sm .icon-card {
            padding: 12px 4px 8px;
            gap: 6px;
        }

        .icon-grid.size-sm .icon-preview {
            width: 36px;
            height: 36px;
        }

        .icon-grid.size-sm .icon-name {
            font-size: 10px;
        }

        .icon-grid.size-lg .icon-card {
            padding: 20px 12px 14px;
            gap: 10px;
        }

        .icon-grid.size-lg .icon-preview {
            width: 56px;
            height: 56px;
        }

        .icon-grid.size-lg .icon-name {
            font-size: 12px;
        }

        /* Copy Toast */
        .icon-card .copy-toast {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--color-success);
            color: var(--color-white);
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 4px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .icon-card.copied .copy-toast {
            opacity: 1;
        }

        /* ===== Dark preview on card ===== */
        .icon-card.dark-preview .icon-preview {
            background: var(--color-gray-900);
            border-radius: 8px;
        }

        .icon-card.dark-preview .icon-preview img {
            filter: brightness(0) invert(1);
        }

        /* Custom color icon */
        .icon-card .icon-preview img.color-custom {
            filter: none;
        }

        /* ===== Empty State ===== */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 24px;
            color: var(--color-gray-400);
        }

        .empty-state .empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .empty-state p {
            font-size: 15px;
            font-weight: 500;
        }

        .empty-state .empty-sub {
            font-size: 13px;
            margin-top: 4px;
            font-weight: 400;
        }

        /* ===== Detail Modal ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--color-white);
            border-radius: 16px;
            width: 480px;
            max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid var(--color-gray-200);
        }

        .modal-header h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--color-gray-100);
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            color: var(--color-gray-500);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: var(--color-gray-200);
        }

        .modal-body {
            padding: 24px;
        }

        .modal-preview {
            display: flex;
            gap: 16px;
            justify-content: center;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-preview-box {
            width: 96px;
            height: 96px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            border: 1px solid var(--color-gray-200);
        }

        .modal-preview-box.light {
            background: var(--color-white);
        }

        .modal-preview-box.dark {
            background: var(--color-gray-900);
        }

        .modal-preview-box img {
            width: 48px;
            height: 48px;
        }

        .modal-preview-box.dark img {
            filter: brightness(0) invert(1);
        }

        .modal-sizes {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 24px;
            padding: 16px;
            background: var(--color-gray-50);
            border-radius: 10px;
        }

        .modal-size-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .modal-size-item span {
            font-size: 11px;
            color: var(--color-gray-400);
            font-weight: 500;
        }

        .modal-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .modal-info-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-info-row .label {
            font-size: 12px;
            color: var(--color-gray-500);
            width: 80px;
            flex-shrink: 0;
        }

        .modal-info-row .value {
            flex: 1;
            font-size: 13px;
            font-family: 'SF Mono', 'Consolas', monospace;
            color: var(--color-gray-700);
            background: var(--color-gray-50);
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid var(--color-gray-200);
            cursor: pointer;
            transition: all 0.15s;
            word-break: break-all;
        }

        .modal-info-row .value:hover {
            border-color: var(--color-primary);
            background: #EFF6FF;
        }

        .modal-info-row .value.copied-val {
            border-color: var(--color-success);
            background: #ECFDF5;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="header">
        <div class="header-top">
            <h1><span>KLDS</span> Icon Library</h1>
            <div class="header-meta">
                Total <strong id="totalCount">0</strong> icons · assets/icons/
            </div>
        </div>

        <div class="controls">
            <div class="search-box">
                <img class="search-icon" src="../assets/icons/ic-search.svg" alt="">
                <input type="text" id="searchInput" placeholder="아이콘 이름으로 검색 (예: home, calendar, user...)">
            </div>

            <div class="size-toggle">
                <button data-size="sm">S</button>
                <button data-size="md" class="active">M</button>
                <button data-size="lg">L</button>
            </div>

            <div class="color-toggle" title="미리보기 배경">
                <button class="color-btn active" data-bg="light" style="background:#FFFFFF;" title="Light"></button>
                <button class="color-btn" data-bg="dark" style="background:#111827;" title="Dark"></button>
            </div>
        </div>

        <div class="category-filter" id="categoryFilter" style="margin-top: 12px;">
            <!-- JS에서 동적 생성 -->
        </div>
    </div>

    <!-- Main -->
    <div class="main">
        <div class="result-info" id="resultInfo"></div>
        <div class="icon-grid" id="iconGrid"></div>
    </div>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">ic-home01</h3>
                <button class="modal-close" id="modalClose">✕</button>
            </div>
            <div class="modal-body">
                <div class="modal-preview" id="modalPreview"></div>
                <div class="modal-sizes" id="modalSizes"></div>
                <div class="modal-info" id="modalInfo"></div>
            </div>
        </div>
    </div>

    <script>
        // ===== Icon Data =====
        const ICONS = [
            "ic-activity", "ic-admin", "ic-alarm", "ic-archive",
            "ic-arrow-circle-down", "ic-arrow-circle-left", "ic-arrow-circle-right", "ic-arrow-circle-up", "ic-arrow-circle-up02", "ic-arrow-left-right", "ic-arrow-left", "ic-arrow-up-right",
            "ic-attachment01", "ic-attachment02",
            "ic-bag", "ic-beach-ball", "ic-bell", "ic-bold", "ic-bolt",
            "ic-book-open", "ic-book", "ic-bookmark-fill", "ic-bookmark", "ic-bottom-handle",
            "ic-bulb", "ic-buliding01", "ic-buliding02",
            "ic-calendar-1", "ic-calendar-30", "ic-calendar-7", "ic-calendar-add", "ic-calendar-check", "ic-calendar-days", "ic-calendar-event", "ic-calendar-week", "ic-calendar",
            "ic-caret-circle-down", "ic-caret-circle-left", "ic-caret-circle-right", "ic-caret-circle-up", "ic-caret-down-duo", "ic-caret-down01", "ic-caret-down02", "ic-caret-left-duo", "ic-caret-left", "ic-caret-right-duo", "ic-caret-right01", "ic-caret-right02", "ic-caret-up-duo", "ic-caret-up",
            "ic-chart-bar01", "ic-chart-bar02", "ic-chart-line", "ic-chart-pie",
            "ic-chat-add", "ic-chat-circle-dot", "ic-chat-circle", "ic-chat-circlep-add", "ic-chat-conversation", "ic-chat-dot", "ic-chat-voice", "ic-chat",
            "ic-check-all", "ic-check", "ic-check02",
            "ic-circle-help", "ic-circle-refusal", "ic-circle-warning",
            "ic-clock",
            "ic-close-circle", "ic-close-small", "ic-close-square", "ic-close",
            "ic-cloud-add", "ic-cloud-check", "ic-cloud-download", "ic-cloud-off", "ic-cloud-upload", "ic-cloud",
            "ic-color-filter", "ic-color-picker", "ic-compass", "ic-copy", "ic-crop",
            "ic-database-backup", "ic-database", "ic-device",
            "ic-door-enter", "ic-doublequotes-l", "ic-doublequotes-r",
            "ic-download-package", "ic-download",
            "ic-drag-horizontal", "ic-drag-vertical",
            "ic-expand", "ic-external-link",
            "ic-file-add", "ic-file-check", "ic-file-code", "ic-file-document", "ic-file-download", "ic-file-edit", "ic-file-search", "ic-file-upload", "ic-file",
            "ic-filter",
            "ic-folder-add", "ic-folder-check", "ic-folder-code", "ic-folder-document", "ic-folder-download", "ic-folder-edit", "ic-folder-search", "ic-folder-upload", "ic-folder", "ic-folder1",
            "ic-forward", "ic-global",
            "ic-headphone", "ic-heart", "ic-hide",
            "ic-home01", "ic-home02", "ic-home03", "ic-horizontal",
            "ic-info", "ic-info02", "ic-italic",
            "ic-layer",
            "ic-link-break", "ic-link01", "ic-link02", "ic-link03",
            "ic-list-check", "ic-list-orderd", "ic-list-unordered",
            "ic-lock", "ic-login",
            "ic-mail-open", "ic-mail",
            "ic-map-search", "ic-map01", "ic-map02",
            "ic-maximize01", "ic-maximize02", "ic-mention",
            "ic-menu-grid", "ic-menu-hamburger",
            "ic-microphone", "ic-microphone-fill",
            "ic-minimize01", "ic-minimize02",
            "ic-minus-circle", "ic-minus-square", "ic-minus",
            "ic-mobile", "ic-monitor",
            "ic-more-horizontal", "ic-more-vertical",
            "ic-mouse", "ic-move", "ic-navigation",
            "ic-news", "ic-notebook",
            "ic-open-folder",
            "ic-pause-circle", "ic-pause",
            "ic-pencil-ai", "ic-pencil-ai01", "ic-pencil01", "ic-pencil02", "ic-pencil03", "ic-pencil04", "ic-pencil05",
            "ic-pin",
            "ic-play-circle", "ic-play",
            "ic-plus-circle", "ic-plus-square", "ic-plus",
            "ic-printer",
            "ic-qrcode",
            "ic-redo", "ic-refresh01", "ic-refresh02", "ic-repeat", "ic-reply",
            "ic-ruler",
            "ic-save",
            "ic-search-minus", "ic-search-plus", "ic-search",
            "ic-send01", "ic-send02",
            "ic-setting", "ic-share",
            "ic-shield-warning", "ic-shield",
            "ic-show", "ic-shrink", "ic-shuffle",
            "ic-sidebar-right", "ic-sitemap",
            "ic-slider01", "ic-slider02", "ic-slider03",
            "ic-sort-asce", "ic-sort-desc", "ic-sort",
            "ic-square-warning", "ic-stamp",
            "ic-star", "ic-star02", "ic-star03-fill", "ic-star03",
            "ic-stop", "ic-strikethrough", "ic-swatch-palette",
            "ic-table-add", "ic-table-remove", "ic-table",
            "ic-telephone", "ic-terminal",
            "ic-text-align-center", "ic-text-align-justify", "ic-text-align-left", "ic-text-align-right", "ic-text",
            "ic-thumb-up",
            "ic-timer-add", "ic-timer",
            "ic-trash-empty", "ic-trash-full",
            "ic-triangle-warning",
            "ic-underline",
            "ic-undo-down-left", "ic-undo-down-right", "ic-undo",
            "ic-unfold-less", "ic-unfold-more",
            "ic-unlock",
            "ic-user-add", "ic-user-remove", "ic-user-screen", "ic-user-voice", "ic-user", "ic-users-circle", "ic-users-group", "ic-users",
            "ic-vertical",
            "ic-volume-max", "ic-volume-min", "ic-volume-minus", "ic-volume-off01", "ic-volume-off02", "ic-volume-plus",
            "ic-weather-sun", "ic-webcam",
            "ic-wifi-low", "ic-wifi-max", "ic-wifi-medium", "ic-wifi-off", "ic-wifi-problem",
            "ic-window-code", "ic-window"
        ];

        // ===== Category Mapping =====
        const CATEGORIES = {
            'All': () => true,
            'Arrow': n => /arrow|caret|expand|shrink|unfold/.test(n),
            'Navigation': n => /home|menu|navigation|compass|sidebar|sitemap/.test(n),
            'Action': n => /check|close|plus|minus|search|filter|sort|download|upload|save|copy|crop|move|drag|redo|undo|refresh|repeat|share|forward|reply|send|expand|shrink|login|door/.test(n),
            'Communication': n => /chat|mail|bell|alarm|microphone|telephone|mention/.test(n),
            'File': n => /file|folder|document|attachment|open-folder/.test(n),
            'Calendar': n => /calendar|schedule|clock|timer/.test(n),
            'User': n => /user|admin/.test(n),
            'Media': n => /play|pause|stop|volume|webcam|headphone|video/.test(n),
            'Editor': n => /bold|italic|underline|strikethrough|text|doublequotes|list/.test(n),
            'Chart': n => /chart|activity/.test(n),
            'Cloud': n => /cloud|wifi|global/.test(n),
            'Device': n => /device|mobile|monitor|mouse|printer|qrcode/.test(n),
            'Status': n => /warning|info|help|refusal|shield|lock|unlock|show|hide/.test(n),
            'Misc': n => /star|heart|bookmark|pin|stamp|bag|bolt|bulb|book|archive|database|layer|ruler|setting|thumb|trash|weather|beach|news|notebook|window|terminal|color|swatch|table|link|map|tag|horizontal|vertical|bottom/.test(n),
        };

        const ICON_PATH = '../assets/icons/';
        let currentSize = 'md';
        let currentBg = 'light';
        let currentCategory = 'All';
        let currentSearch = '';

        // ===== Init =====
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('totalCount').textContent = ICONS.length;
            buildCategoryFilter();
            renderGrid();
            bindEvents();
        });

        // ===== Build Category Chips =====
        function buildCategoryFilter() {
            const container = document.getElementById('categoryFilter');
            Object.keys(CATEGORIES).forEach(cat => {
                const count = cat === 'All' ? ICONS.length : ICONS.filter(CATEGORIES[cat]).length;
                const chip = document.createElement('button');
                chip.className = 'category-chip' + (cat === 'All' ? ' active' : '');
                chip.dataset.category = cat;
                chip.innerHTML = `${cat}<span class="count">${count}</span>`;
                container.appendChild(chip);
            });
        }

        // ===== Render Grid =====
        function renderGrid() {
            const grid = document.getElementById('iconGrid');
            const info = document.getElementById('resultInfo');

            // Filter
            let filtered = ICONS;

            if (currentCategory !== 'All') {
                filtered = filtered.filter(CATEGORIES[currentCategory]);
            }

            if (currentSearch) {
                const q = currentSearch.toLowerCase();
                filtered = filtered.filter(n => n.toLowerCase().includes(q));
            }

            // Result info
            if (currentSearch || currentCategory !== 'All') {
                info.innerHTML = `검색 결과: <strong>${filtered.length}</strong>개`;
            } else {
                info.innerHTML = `전체 <strong>${filtered.length}</strong>개 아이콘`;
            }

            // Size class
            grid.className = 'icon-grid';
            if (currentSize === 'sm') grid.classList.add('size-sm');
            if (currentSize === 'lg') grid.classList.add('size-lg');

            // Render
            if (filtered.length === 0) {
                grid.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">🔍</div>
                <p>검색 결과가 없습니다</p>
                <p class="empty-sub">"${currentSearch}" 에 해당하는 아이콘을 찾을 수 없습니다</p>
            </div>
        `;
                return;
            }

            const imgSize = currentSize === 'sm' ? 20 : currentSize === 'lg' ? 32 : 24;
            const darkClass = currentBg === 'dark' ? ' dark-preview' : '';

            grid.innerHTML = filtered.map(name => `
        <div class="icon-card${darkClass}" data-icon="${name}" title="${name}\n클릭하여 이름 복사">
            <div class="icon-preview">
                <img src="${ICON_PATH}${name}.svg" alt="${name}" width="${imgSize}" height="${imgSize}">
            </div>
            <div class="icon-name">${name.replace('ic-', '')}</div>
            <span class="copy-toast">Copied!</span>
        </div>
    `).join('');
        }

        // ===== Bind Events =====
        function bindEvents() {
            // Search
            const searchInput = document.getElementById('searchInput');
            let debounce;
            searchInput.addEventListener('input', () => {
                clearTimeout(debounce);
                debounce = setTimeout(() => {
                    currentSearch = searchInput.value.trim();
                    renderGrid();
                }, 200);
            });

            // Size toggle
            document.querySelectorAll('.size-toggle button').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.size-toggle button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentSize = btn.dataset.size;
                    renderGrid();
                });
            });

            // Color toggle
            document.querySelectorAll('.color-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentBg = btn.dataset.bg;
                    renderGrid();
                });
            });

            // Category filter
            document.getElementById('categoryFilter').addEventListener('click', (e) => {
                const chip = e.target.closest('.category-chip');
                if (!chip) return;
                document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentCategory = chip.dataset.category;
                renderGrid();
            });

            // Icon card click → copy name
            document.getElementById('iconGrid').addEventListener('click', (e) => {
                const card = e.target.closest('.icon-card');
                if (!card) return;
                const name = card.dataset.icon;

                // Shift+Click → open detail modal
                if (e.shiftKey) {
                    openModal(name);
                    return;
                }

                // Copy icon name
                navigator.clipboard.writeText(name).then(() => {
                    card.classList.add('copied');
                    setTimeout(() => card.classList.remove('copied'), 1200);
                });
            });

            // Double click → open modal
            document.getElementById('iconGrid').addEventListener('dblclick', (e) => {
                const card = e.target.closest('.icon-card');
                if (!card) return;
                openModal(card.dataset.icon);
            });

            // Modal close
            document.getElementById('modalClose').addEventListener('click', closeModal);
            document.getElementById('modalOverlay').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeModal();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeModal();
            });
        }

        // ===== Modal =====
        function openModal(name) {
            const overlay = document.getElementById('modalOverlay');
            document.getElementById('modalTitle').textContent = name;

            // Preview (light + dark)
            document.getElementById('modalPreview').innerHTML = `
        <div class="modal-preview-box light">
            <img src="${ICON_PATH}${name}.svg" alt="${name}">
        </div>
        <div class="modal-preview-box dark">
            <img src="${ICON_PATH}${name}.svg" alt="${name}">
        </div>
    `;

            // Size variants
            const sizes = [16, 20, 24, 32, 40];
            document.getElementById('modalSizes').innerHTML = sizes.map(s => `
        <div class="modal-size-item">
            <img src="${ICON_PATH}${name}.svg" alt="" width="${s}" height="${s}">
            <span>${s}px</span>
        </div>
    `).join('');

            // Info rows
            const imgTag = `<img src="assets/icons/${name}.svg" width="24" height="24">`;
            const cssClass = name;
            const filePath = `assets/icons/${name}.svg`;

            document.getElementById('modalInfo').innerHTML = `
        <div class="modal-info-row">
            <span class="label">파일명</span>
            <span class="value" data-copy="${name}.svg">${name}.svg</span>
        </div>
        <div class="modal-info-row">
            <span class="label">경로</span>
            <span class="value" data-copy="${filePath}">${filePath}</span>
        </div>
        <div class="modal-info-row">
            <span class="label">HTML</span>
            <span class="value" data-copy='${imgTag.replace(/'/g, "&#39;")}'>${imgTag.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</span>
        </div>
        <div class="modal-info-row">
            <span class="label">CSS bg</span>
            <span class="value" data-copy="background-image: url('${filePath}');">background-image: url('${filePath}');</span>
        </div>
    `;

            // Copy on click
            document.querySelectorAll('.modal-info-row .value').forEach(el => {
                el.addEventListener('click', () => {
                    navigator.clipboard.writeText(el.dataset.copy).then(() => {
                        el.classList.add('copied-val');
                        setTimeout(() => el.classList.remove('copied-val'), 1200);
                    });
                });
            });

            overlay.classList.add('show');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('show');
        }
    </script>

</body>

</html>
