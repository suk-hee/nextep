name: Sync Design Tokens
on:
  push:
    paths:
      - 'tokens/**'

# 1. 권한 추가: 이 부분이 없으면 push 단계에서 128 에러가 납니다.
permissions:
  contents: write

jobs:
  build-tokens:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # v3 -> v4 업데이트

      - name: Setup Node.js
        uses: actions/setup-node@v4 # v3 -> v4 업데이트
        with:
          node-version: '20' # 경고 메시지에 따라 Node 20 이상 권장

      - name: Install dependencies
        run: npm install style-dictionary

      - name: Build design tokens
        run: npx style-dictionary build --config config.json

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code styles/tokens.css || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and Push changes
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add styles/tokens.css
          git commit -m "style: Figma 디자인 토큰 업데이트"
          git push