name: Sync Design Tokens
on:
  push:
    paths:
      - 'tokens/**'
      - 'config.mjs'
  workflow_dispatch:

# 1. 권한 추가: 이 부분이 없으면 push 단계에서 128 에러가 납니다.
permissions:
  contents: write

jobs:
  build-tokens:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install style-dictionary@^4

      - name: Build design tokens
        run: npx style-dictionary build --config config.mjs

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code styles/tokens.css || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and Push changes
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add styles/tokens.css
          git commit -m "style: Figma 디자인 토큰 업데이트"
          git push