<!--
  KLDS Checkbox Component - HTML Templates
  Figma 노드: 1:17637 (checkbox COMPONENT_SET)

  변형:
    checked=false  → 흰색 배경(#FFFFFF), 회색 테두리(#9CA3AF), cornerRadius:4
    checked=true   → 파란색 배경(#005386), 흰색 체크 아이콘(#FFFFFF), cornerRadius:4

  구조:
    label.klds-checkbox
    ├─ input.klds-checkbox__input[type="checkbox"]
    └─ span.klds-checkbox__box
       └─ svg.klds-checkbox__icon (체크 아이콘, checked 시 display)
-->

<!-- checked=false -->
<label class="klds-checkbox">
  <input type="checkbox" class="klds-checkbox__input">
  <span class="klds-checkbox__box">
    <svg class="klds-checkbox__icon" width="12" height="8" viewBox="0 0 12 8" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M1 3.5L4.5 7L11 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </span>
</label>

<!-- checked=true -->
<label class="klds-checkbox">
  <input type="checkbox" class="klds-checkbox__input" checked>
  <span class="klds-checkbox__box">
    <svg class="klds-checkbox__icon" width="12" height="8" viewBox="0 0 12 8" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M1 3.5L4.5 7L11 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </span>
</label>
