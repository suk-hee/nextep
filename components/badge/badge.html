<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badge Component — KLDS</title>
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="../../styles/reset.css">
    <link rel="stylesheet" href="../../styles/tokens.css">
    <link rel="stylesheet" href="badge.css">
</head>

<body>

    <!-- ============================================================
       Badge Component — Figma node 512:11070
       type=number | type=dot
       ============================================================ -->

    <!-- type=number -->
    <h3 style="margin:20px 0 8px; font-size:14px; color:#374151;">type=number</h3>
    <div style="display:flex; align-items:center; gap:12px;">
        <span class="klds-badge klds-badge--number">3</span>
        <span class="klds-badge klds-badge--number">8</span>
        <span class="klds-badge klds-badge--number">12</span>
        <span class="klds-badge klds-badge--number">99</span>
    </div>

    <!-- type=dot -->
    <h3 style="margin:20px 0 8px; font-size:14px; color:#374151;">type=dot</h3>
    <div style="display:flex; align-items:center; gap:12px;">
        <span class="klds-badge klds-badge--dot"></span>
    </div>

</body>

</html>
