<!--
  KLDS Schedule Tag Component - HTML Templates
  Figma 노드: 1392:25573

  사용법:
  .klds-schedule-tag
    .klds-schedule-tag--{color}  : white | gray | red | orange | green
                                    lightblue | blue | purple | pink | volcano

  구성:
    .klds-schedule-tag__content
      .klds-schedule-tag__title   (스케쥴 제목 텍스트)
      .klds-schedule-tag__avatars (아바타 그룹, xxsmall/24px stacked)
        .avatar                   (기존 .avatar 클래스, 24px override 적용)
          .avatar__image          (또는 .avatar__fallback)

  의존 CSS:
    - components/avatar/avatar.css
    - components/schedule-tag/schedule-tag.css
-->

<!-- ═══════════════════════════════════════════
     white
     ═══════════════════════════════════════════ -->
<div class="klds-schedule-tag klds-schedule-tag--white">
  <div class="klds-schedule-tag__content">
    <span class="klds-schedule-tag__title">Schedule Title</span>
    <div class="klds-schedule-tag__avatars">
      <div class="avatar">
        <img class="avatar__image" src="../../assets/avatars/male01.jpg" alt="홍길동" />
      </div>
      <div class="avatar">
        <img class="avatar__image" src="../../assets/avatars/female01.jpg" alt="이영희" />
      </div>
      <div class="avatar">
        <img class="avatar__image" src="../../assets/avatars/male02.jpg" alt="김철수" />
      </div>
      <div class="avatar">
        <img class="avatar__image" src="../../assets/avatars/female02.jpg" alt="박지수" />
      </div>
    </div>
  </div>
</div>
