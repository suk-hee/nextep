<link rel="stylesheet" href="../../styles/reset.css">
<link rel="stylesheet" href="../../styles/global.css">
<link rel="stylesheet" href="tag-file.css">

<!-- 
  KLDS Tag File Component
  
  가변 폭을 가지는 파일 태그 컴포넌트입니다.
  지원되는 파일 형식 아이콘: ppt, word, excel, pdf, hwp
  아이콘 이미지는 assets/attach 폴더를 참조합니다.
-->

<!-- 기본 태그 파일 (supportInfo 없음) -->
<div class="klds-tag-file">
    <div class="klds-tag-file__icon">
        <img src="../../assets/attach/ppt.svg" alt="ppt">
    </div>
    <div class="klds-tag-file__content">
        <div class="klds-tag-file__name">file name.pptx</div>
    </div>
</div>

<!-- 태그 파일 (supportInfo 포함) -->
<div class="klds-tag-file">
    <div class="klds-tag-file__icon">
        <img src="../../assets/attach/word.svg" alt="word">
    </div>
    <div class="klds-tag-file__content">
        <div class="klds-tag-file__support-info">포스코 제안ㆍ11-04</div>
        <div class="klds-tag-file__name">file name.docx</div>
    </div>
</div>
