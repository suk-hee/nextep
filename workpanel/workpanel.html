  <!-- Monthly Calendar 동적 렌더링 모듈 -->
  <script>
    (function () {
      'use strict';

      var today = new Date();
      today.setHours(0, 0, 0, 0);

      var calYear = today.getFullYear();
      var calMonth = today.getMonth();

      var tagPeople = [
        { name: '박소정', color: 'purple' },
        { name: '신명훈', color: 'green' },
        { name: '박수진', color: 'blue' }
      ];

      function getTags(date) {
        var dow = date.getDay();
        if (dow === 0 || dow === 6) return [];
        var d = date.getDate();
        var mo = date.getMonth();
        return tagPeople.map(function (person, i) {
          var seed = d * 7 + i * 13 + mo * 3;
          var isYeoncha = (seed % 17 === 0);
          var count = (seed % 6) + 1;
          return { color: person.color, text: person.name + (isYeoncha ? ' 연차' : ' ' + count) };
        });
      }

      function formatMonth(y, m) {
        return y + '.' + String(m + 1).padStart(2, '0');
      }

      function render(year, month) {
        var calendarEl = document.getElementById('comp-monthly-calendar');
        var grid = calendarEl ? calendarEl.querySelector('.calendar') : null;
        if (!grid) return;

        calYear = year;
        calMonth = month;

        grid.innerHTML = '';

        // 요일 헤더
        ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].forEach(function (label, i) {
          var h = document.createElement('div');
          h.className = 'calendar__header' + (i === 0 ? ' calendar__header--holiday' : '');
          h.textContent = label;
          grid.appendChild(h);
        });

        var activeTabEl = document.querySelector('.bottom-box__schedule-header .tab--active');
        var activeTabId = activeTabEl ? activeTabEl.getAttribute('data-tab') : 'me';

        var firstDay = new Date(year, month, 1).getDay();
        var daysInMonth = new Date(year, month + 1, 0).getDate();
        var totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
        var weeks = totalCells / 7;

        grid.style.gridTemplateRows = '48px repeat(' + weeks + ', 1fr)';

        for (var i = 0; i < totalCells; i++) {
          var cellDate = new Date(year, month, i - firstDay + 1);
          var cellDay = cellDate.getDate();
          var cellMonthVal = cellDate.getMonth();
          var dow = cellDate.getDay();
          var isCurrentMonth = cellMonthVal === month;
          var isToday = isCurrentMonth && cellDate.getTime() === today.getTime();

          var classes = ['calendar__cell'];
          if (!isCurrentMonth) {
            classes.push('calendar__cell--another');
          } else if (isToday) {
            classes.push('calendar__cell--today');
          } else if (dow === 0) {
            classes.push('calendar__cell--holiday');
          }

          var cell = document.createElement('div');
          cell.className = classes.join(' ');

          var numDiv = document.createElement('div');
          numDiv.className = 'calendar__number';
          var numSpan = document.createElement('span');
          numSpan.textContent = cellDay;
          numDiv.appendChild(numSpan);
          cell.appendChild(numDiv);

          if (isCurrentMonth) {
            var tags = getTags(cellDate);
            if (activeTabId === 'me') {
              tags = tags.filter(function (t) { return t.color === 'purple'; });
            }
            if (tags.length > 0) {
              var tagsDiv = document.createElement('div');
              tagsDiv.className = 'calendar__tags';
              tags.forEach(function (tag) {
                var tagEl = document.createElement('div');
                tagEl.className = 'calendar__tag calendar__tag--' + tag.color;
                tagEl.textContent = tag.text;
                tagsDiv.appendChild(tagEl);
              });
              cell.appendChild(tagsDiv);
            }
          }

          grid.appendChild(cell);
        }

        // 날짜 표시 → 월/년 포맷으로 전환
        var dateEl = document.querySelector('.bottom-box__date');
        if (dateEl) dateEl.textContent = formatMonth(year, month);

        // monthly 뷰에서는 next 버튼 항상 활성화
        var nextBtn = document.querySelector('.bottom-box__nav-btn--next');
        if (nextBtn) nextBtn.disabled = false;
      }

      window.__monthlyCalendar = {
        render: function () { render(calYear, calMonth); },
        prevMonth: function () {
          calMonth--;
          if (calMonth < 0) { calMonth = 11; calYear--; }
          render(calYear, calMonth);
        },
        nextMonth: function () {
          calMonth++;
          if (calMonth > 11) { calMonth = 0; calYear++; }
          render(calYear, calMonth);
        },
        reset: function () {
          calYear = today.getFullYear();
          calMonth = today.getMonth();
        }
      };
    })();
  </script>

  <!-- Daily/Weekly/Monthly 토글 스크립트 -->
  <script>
    (function () {
      'use strict';

      var toggleBtns = document.querySelectorAll('.bottom-box__toggle-btn');
      var monthlyCalendar = document.getElementById('comp-monthly-calendar');
      var weeklyCalendarEl = document.getElementById('comp-weekly-calendar');
      var timetableMe = document.getElementById('comp-timetable-me');
      var timetableTeam = document.getElementById('comp-timetable-team');
      var compTable = document.getElementById('comp-table');

      function hideDailyViews() {
        if (timetableMe) timetableMe.style.display = 'none';
        if (timetableTeam) timetableTeam.style.display = 'none';
        if (compTable) compTable.style.display = 'none';
      }

      function showDailyViews() {
        if (monthlyCalendar) monthlyCalendar.style.display = 'none';
        if (weeklyCalendarEl) weeklyCalendarEl.style.display = 'none';
        if (compTable) compTable.style.display = '';
        var activeScheduleTab = document.querySelector('.bottom-box__schedule-header .tab--active');
        var activeTabId = activeScheduleTab ? activeScheduleTab.getAttribute('data-tab') : 'me';
        if (activeTabId === 'team') {
          if (timetableMe) timetableMe.style.display = 'none';
          if (timetableTeam) timetableTeam.style.display = '';
          var innerTeam = document.querySelector('[data-timetable-tab="team"]');
          if (innerTeam) innerTeam.style.display = '';
        } else {
          if (timetableMe) timetableMe.style.display = '';
          if (timetableTeam) timetableTeam.style.display = '';
          var innerTeam = document.querySelector('[data-timetable-tab="team"]');
          if (innerTeam) innerTeam.style.display = 'none';
        }
        if (window.__dateNav) window.__dateNav.restore();
      }

      toggleBtns.forEach(function (btn) {

  <script>

      var aiPanel = document.querySelector('.ai-assistant');
      var btnMaximize = document.querySelector('.ai-assistant__btn-maximize');
      var workArea = document.querySelector('.layout-content__work-area');

      if (!aiPanel) return;

      // Maximize 토글: 좌우 패널 노출 + work-area 숨김
      if (btnMaximize) {
        btnMaximize.addEventListener('click', function () {
          if (aiPanel.classList.contains('is-maximized')) return;
          if (window.innerWidth <= 1200) {
            Snackbar.show('작은 화면에서 AI Assistant를 확장할 수 없습니다.');
            return;
          }
          var isMaximized = aiPanel.classList.toggle('is-maximized');
          if (isMaximized) {
            if (workArea) workArea.classList.add('is-hidden');
          } else {
            if (workArea) workArea.classList.remove('is-hidden');
          }
        });
      }

      // Collapse — 확장 상태에서 close 버튼 클릭 시
      document.addEventListener('ai-assistant:collapse', function () {
        aiPanel.classList.remove('is-maximized');
        if (workArea) workArea.classList.remove('is-hidden');
      });

      // Close + FAB 토글은 common-layout.js의
      // closeAiAssistant / openAiAssistant에서 처리
      // (ai-assistant:close 이벤트 + .layout-fab 클릭)

  <script>
    (function () {

      var scheduleTabs = document.querySelector('.bottom-box__schedule-header .tabs');
      if (!scheduleTabs) return;

      var timetableMe = document.querySelector('[data-timetable-tab="me"]');
      var timetableTeam = document.querySelector('[data-timetable-tab="team"]');
      if (!timetableMe || !timetableTeam) return;

      var compTimetableMe = document.getElementById('comp-timetable-me');

      scheduleTabs.addEventListener('tab:change', function (e) {
        var tabId = e.detail.tabId;
        var activeToggle = document.querySelector('.bottom-box__toggle-btn--active');
        var activeView = activeToggle ? activeToggle.getAttribute('data-view') : 'daily';
        var isMonthly = activeView === 'monthly';
        var isWeekly  = activeView === 'weekly';

        if (isMonthly) {
          if (window.__monthlyCalendar) window.__monthlyCalendar.render();
          return;
        }

        if (isWeekly) {
          if (window.__weeklyCalendar && window.__getWeeklyEvents) {
            window.__weeklyCalendar.update({ events: window.__getWeeklyEvents() });
          }
          return;
        }

        if (tabId === 'team') {
          if (compTimetableMe) compTimetableMe.style.display = 'none';
          timetableTeam.style.display = '';
        } else {
          if (compTimetableMe) compTimetableMe.style.display = '';
          timetableMe.style.display = '';
          timetableTeam.style.display = 'none';
        }
      });
    })();

  <script>
    (function () {
      'use strict';

      var timetableTeam = document.querySelector('[data-timetable-tab="team"]');
      if (!timetableTeam) return;

      var checkAll = timetableTeam.querySelector('[data-check-all]');
      var rows = timetableTeam.querySelectorAll('.timetable__row');
      var rowCheckboxes = [];

      rows.forEach(function (row) {
        var cb = row.querySelector('.timetable__checkbox');
        if (cb) rowCheckboxes.push({ checkbox: cb, row: row });
      });

      function toggleCheckbox(item) {
        var isChecked = item.checkbox.classList.toggle('timetable__checkbox--checked');
        if (isChecked) {
          item.row.classList.add('timetable__row--checked');
        } else {
          item.row.classList.remove('timetable__row--checked');
        }
        updateCheckAll();
      }

      function updateCheckAll() {
        if (!checkAll) return;
        var allChecked = rowCheckboxes.every(function (item) {
          return item.checkbox.classList.contains('timetable__checkbox--checked');
        });
        if (allChecked && rowCheckboxes.length > 0) {
          checkAll.classList.add('timetable__checkbox--checked');
        } else {
          checkAll.classList.remove('timetable__checkbox--checked');
        }
      }

      if (checkAll) {
        checkAll.addEventListener('click', function () {
          var willCheck = !checkAll.classList.contains('timetable__checkbox--checked');
          rowCheckboxes.forEach(function (item) {
            if (willCheck) {
              item.checkbox.classList.add('timetable__checkbox--checked');
              item.row.classList.add('timetable__row--checked');
            } else {
              item.checkbox.classList.remove('timetable__checkbox--checked');
              item.row.classList.remove('timetable__row--checked');
            }
          });
          updateCheckAll();
        });
      }

      rowCheckboxes.forEach(function (item) {
        item.checkbox.addEventListener('click', function () {
          toggleCheckbox(item);
        });
      });

      rowCheckboxes.forEach(function (item) {
        if (item.row.classList.contains('timetable__row--checked')) {
          item.checkbox.classList.add('timetable__checkbox--checked');
        }
      });
      updateCheckAll();
    })();
  </script>

  <script>
    (function () {
      'use strict';

      var dateEl = document.querySelector('.bottom-box__date');
      var prevBtn = document.querySelector('.bottom-box__nav-btn--prev');
      var nextBtn = document.querySelector('.bottom-box__nav-btn--next');

      if (!dateEl || !prevBtn || !nextBtn) return;

      var today = new Date();
      today.setHours(0, 0, 0, 0);
      var currentDate = new Date(today);

      /* 날짜 → 해당 주의 일요일 반환 */
      function getSunday(date) {
        var d = new Date(date);
        d.setDate(d.getDate() - d.getDay());
        d.setHours(0, 0, 0, 0);
        return d;
      }
      var currentWeekSunday = getSunday(today);

      function formatDate(date) {
        var y = date.getFullYear();
        var m = String(date.getMonth() + 1).padStart(2, '0');
        var d = String(date.getDate()).padStart(2, '0');
        return y + '.' + m + '.' + d;
      }

      /* 주간 범위 포맷: "2026.04.13 ~ 04.19" */
      function formatWeekRange(sunday) {
        var end = new Date(sunday);
        end.setDate(end.getDate() + 6);
        var y  = sunday.getFullYear();
        var sm = String(sunday.getMonth() + 1).padStart(2, '0');
        var sd = String(sunday.getDate()).padStart(2, '0');
        var em = String(end.getMonth() + 1).padStart(2, '0');
        var ed = String(end.getDate()).padStart(2, '0');
        return y + '.' + sm + '.' + sd + ' ~ ' + em + '.' + ed;
      }

      function getActiveView() {
        var btn = document.querySelector('.bottom-box__toggle-btn--active');
        return btn ? btn.getAttribute('data-view') : 'daily';
      }

      function isMonthlyActive() { return getActiveView() === 'monthly'; }
      function isWeeklyActive()  { return getActiveView() === 'weekly';  }

      function updateUI() {
        if (isWeeklyActive()) {
          dateEl.textContent = formatWeekRange(currentWeekSunday);
          nextBtn.disabled = false;
          if (window.__weeklyCalendar) {
            window.__weeklyCalendar.update({ startDate: new Date(currentWeekSunday) });
          }
        } else if (!isMonthlyActive()) {
          dateEl.textContent = formatDate(currentDate);
          nextBtn.disabled = currentDate.getTime() === today.getTime();
        }
      }

      updateUI();

      prevBtn.addEventListener('click', function () {
        if (isMonthlyActive() && window.__monthlyCalendar) {
          window.__monthlyCalendar.prevMonth();
        } else if (isWeeklyActive()) {
          currentWeekSunday.setDate(currentWeekSunday.getDate() - 7);
          updateUI();
        } else {
          currentDate.setDate(currentDate.getDate() - 1);
          updateUI();
        }
      });

      nextBtn.addEventListener('click', function () {
        if (isMonthlyActive() && window.__monthlyCalendar) {
          window.__monthlyCalendar.nextMonth();
        } else if (isWeeklyActive()) {
          currentWeekSunday.setDate(currentWeekSunday.getDate() + 7);
          updateUI();
        } else {
          if (nextBtn.disabled) return;
          currentDate.setDate(currentDate.getDate() + 1);
          updateUI();
        }
      });

      window.__dateNav = {
        restore:     function ()  { updateUI(); },
        getSunday:   function ()  { return new Date(currentWeekSunday); },
        initWeekly:  function ()  {
          currentWeekSunday = getSunday(currentDate);
          updateUI();
        }
      };
    })();
  </script>

  <!-- 테이블 필터 메뉴 (요청자 / 우선순위 / 상태) -->
  <script>
    (function () {
      // 필터 정의: iconIndex = 헤더 filter-icon 순서, getValue = 행에서 값 추출
      var FILTERS = [
        {
          items: ['임혁수', '박소정', 'AI'],
          getValue: function (row) {
            var cell = row.querySelectorAll('.klds-table__col--120')[0];
            return cell ? cell.textContent.trim() : '';
          }
        },
        {
          items: ['높음', '중간', '낮음'],
          getValue: function (row) {
            var cell = row.querySelectorAll('.klds-table__col--100')[0];
            var label = cell && cell.querySelector('.klds-tag__label');
            return label ? label.textContent.trim() : '';
          }
        },
        {
          items: ['대기', '진행', '완료'],
          getValue: function (row) {
            var cell = row.querySelectorAll('.klds-table__col--100')[1];
            var label = cell && cell.querySelector('.klds-tag__label');
            return label ? label.textContent.trim() : '';
          }
        }
      ];

      var menus = [];

      // 단일 klds-menu 생성 (body에 붙임 — overflow 클리핑 회피)
      function buildMenu(items) {
        var menu = document.createElement('div');
        menu.className = 'klds-menu';
        menu.style.cssText = 'position:fixed;z-index:9999;display:none;min-width:140px';

        items.forEach(function (name) {
          var label = document.createElement('label');
          label.className = 'klds-menu__item';
          label.innerHTML = [
            '<div class="klds-menu__item-checkbox">',
            '  <div class="klds-checkbox">',
            '    <input type="checkbox" class="klds-checkbox__input" checked>',
            '    <span class="klds-checkbox__box">',
            '      <svg class="klds-checkbox__icon" width="12" height="8" viewBox="0 0 12 8" fill="none" xmlns="http://www.w3.org/2000/svg">',
            '        <path d="M1 3.5L4.5 7L11 1" stroke="white" stroke-width="1.6667" stroke-linecap="round" stroke-linejoin="round"/>',
            '      </svg>',
            '    </span>',
            '  </div>',
            '</div>',
            '<span class="klds-menu__item-text">' + name + '</span>'
          ].join('');

          label.querySelector('.klds-checkbox__input').addEventListener('change', applyAllFilters);
          menu.appendChild(label);
        });

        document.body.appendChild(menu);
        return menu;
      }

      // 열려 있는 다른 메뉴 모두 닫기
      function closeAllMenus() {
        menus.forEach(function (m) { m.style.display = 'none'; });
      }

      // 모든 필터를 AND 조건으로 적용
      function applyAllFilters() {
        // 각 필터의 체크된 값 수집
        var checkedSets = FILTERS.map(function (f, i) {
          var checked = [];
          menus[i].querySelectorAll('.klds-checkbox__input').forEach(function (cb, j) {
            if (cb.checked) checked.push(f.items[j]);
          });
          return checked;
        });

        document.querySelectorAll('#comp-table .klds-table__row').forEach(function (row) {
          var visible = FILTERS.every(function (f, i) {
            return checkedSets[i].includes(f.getValue(row));
          });
          row.style.display = visible ? '' : 'none';
        });
      }

      function destroy() {
        menus.forEach(function (m) { m.remove(); });
        menus = [];
      }

      function init() {
        destroy(); // 이전 메뉴 정리 후 재초기화
        var filterIcons = document.querySelectorAll('#comp-table .klds-table__filter-icon');
        if (!filterIcons.length) return;

        // 각 filter icon에 메뉴 연결
        filterIcons.forEach(function (icon, idx) {
          if (!FILTERS[idx]) return;

          var menu = buildMenu(FILTERS[idx].items);
          menus.push(menu);

          icon.style.cursor = 'pointer';
          icon.addEventListener('click', function (e) {
            e.stopPropagation();
            var isOpen = menu.style.display !== 'none';
            closeAllMenus();
            if (!isOpen) {
              var rect = icon.getBoundingClientRect();
              menu.style.top = (rect.bottom + 4) + 'px';
              menu.style.left = rect.left + 'px';
              menu.style.display = 'block';
            }
          });

          // 메뉴 내부 클릭은 닫히지 않도록
          menu.addEventListener('click', function (e) { e.stopPropagation(); });
        });

        // 바깥 클릭 → 모든 메뉴 닫기
        document.addEventListener('click', closeAllMenus);
      }

      window.__tableFilters = { init: init, destroy: destroy };
      init();
    })();
  </script>
